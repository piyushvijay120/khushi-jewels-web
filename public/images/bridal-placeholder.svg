<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#daa520;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="#f9f5f0"/>
  <!-- Necklace -->
  <path d="M 100 100 Q 200 140 300 100" fill="none" stroke="url(#goldGrad)" stroke-width="8" opacity="0.8"/>
  <!-- Center stone -->
  <circle cx="200" cy="160" r="40" fill="url(#goldGrad)" opacity="0.9"/>
  <!-- Bangles -->
  <circle cx="130" cy="260" r="35" fill="none" stroke="url(#goldGrad)" stroke-width="10" opacity="0.7"/>
  <circle cx="270" cy="260" r="35" fill="none" stroke="url(#goldGrad)" stroke-width="10" opacity="0.7"/>
  <!-- Earrings -->
  <circle cx="80" cy="120" r="25" fill="url(#goldGrad)" opacity="0.8"/>
  <circle cx="320" cy="120" r="25" fill="url(#goldGrad)" opacity="0.8"/>
  <text x="200" y="350" font-size="24" text-anchor="middle" fill="#666">Bridal Set</text>
</svg>